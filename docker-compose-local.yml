services:
  db:
    image: rasulkireev/custom-postgres:18
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=awesome_repos
      - POSTGRES_USER=awesome_repos
      - POSTGRES_PASSWORD=awesome_repos
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U awesome_repos"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.6.3-alpine
    command: redis-server --requirepass awesome_repos
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    environment:
      - REDIS_PASSWORD=awesome_repos

  backend:
    build:
      context: .
      dockerfile: Dockerfile-python
    working_dir: /app
    command: sh -c "uv run --no-sync python manage.py migrate && uv run --no-sync python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      frontend:
        condition: service_healthy
    env_file:
      - .env

  workers:
    build:
      context: .
      dockerfile: Dockerfile-python
    working_dir: /app
    command: uv run --no-sync python manage.py qcluster
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env

  frontend:
    image: node:24.15.0
    working_dir: /app
    command: sh -c "rm -f frontend/static/.assets-ready && npm install && npm run watch"
    volumes:
      - .:/app
    healthcheck:
      test: ["CMD-SHELL", "test -f frontend/static/.assets-ready"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  mailhog:
    image: mailhog/mailhog
    expose:
      - 1025
      - 8025
    ports:
      - "1025:1025"
      - "8025:8025"





  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: awesome_repos-user
      MINIO_ROOT_PASSWORD: awesome_repos-password
    command: server --console-address ":9001" /data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 3

  createbuckets:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      sleep 5 &&
      /usr/bin/mc config host add myminio http://minio:9000 awesome_repos awesome_repos &&
      /usr/bin/mc mb myminio/awesome_repos-dev &&
      /usr/bin/mc anonymous set download myminio/awesome_repos-dev &&
      exit 0;
      "


volumes:
  postgres_data:
  redis_data:
  minio_data:
