services:
  - type: web
    name: awesome_repos-web
    runtime: python
    buildCommand: |
      uv sync --locked --no-dev --no-install-project &&
      npm install &&
      npm run build &&
      uv run --no-sync python manage.py collectstatic --noinput
    startCommand: uv run --no-sync python manage.py migrate && uv run --no-sync gunicorn awesome_repos.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --threads 2 --timeout 120
    plan: free
    healthCheckPath: /

    envVars:
      - fromGroup: app-env
      - key: POSTGRES_DB
        fromDatabase:
          name: awesome_repos-db
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: awesome_repos-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: awesome_repos-db
          property: password
      - key: POSTGRES_HOST
        fromDatabase:
          name: awesome_repos-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: awesome_repos-db
          property: port
      - key: REDIS_HOST
        fromService:
          type: keyvalue
          name: awesome_repos-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: keyvalue
          name: awesome_repos-redis
          property: port
      - key: REDIS_PASSWORD
        fromService:
          type: keyvalue
          name: awesome_repos-redis
          property: password

  - type: web
    name: awesome_repos-workers
    runtime: python
    buildCommand: |
      uv sync --locked --no-dev --no-install-project
    startCommand: uv run --no-sync python manage.py qcluster & uv run --no-sync python -m http.server $PORT
    plan: free
    healthCheckPath: /

    envVars:
      - fromGroup: app-env
      - key: POSTGRES_DB
        fromDatabase:
          name: awesome_repos-db
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: awesome_repos-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: awesome_repos-db
          property: password
      - key: POSTGRES_HOST
        fromDatabase:
          name: awesome_repos-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: awesome_repos-db
          property: port
      - key: REDIS_HOST
        fromService:
          type: keyvalue
          name: awesome_repos-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: keyvalue
          name: awesome_repos-redis
          property: port
      - key: REDIS_PASSWORD
        fromService:
          type: keyvalue
          name: awesome_repos-redis
          property: password

  - type: keyvalue
    name: awesome_repos-redis
    plan: free
    ipAllowList: []
    maxmemoryPolicy: allkeys-lfu

databases:
  - name: awesome_repos-db
    databaseName: awesome_repos
    user: awesome_repos_user
    plan: free


envVarGroups:
  - name: app-env
    envVars:
      - key: PYTHON_VERSION
        value: "3.14.5"
      - key: NODE_VERSION
        value: "24.15.0"
      - key: ENVIRONMENT
        value: prod
      - key: UV_VERSION
        value: "0.11.15"
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true

      # Site URL - auto-generated by Render
      - key: SITE_URL
        value: $RENDER_EXTERNAL_URL

      # Set to False to pause new account creation while keeping existing logins working.
      - key: ALLOW_SIGNUPS
        value: "True"


      # Optional. If not specified, local FileSystemStorage is used for media files.
      - key: AWS_S3_ENDPOINT_URL
        value: ""
      - key: AWS_ACCESS_KEY_ID
        value: ""
      - key: AWS_SECRET_ACCESS_KEY
        value: ""


      # Basic email setup - can be configured later
      - key: MAILGUN_API_KEY
        value: ""

      # Redis Database Number
      - key: REDIS_DB
        value: "0"
