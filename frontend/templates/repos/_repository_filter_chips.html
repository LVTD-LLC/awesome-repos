{% if active_repository_filters %}
    {% for filter in active_repository_filters %}
        <a href="{{ search_action_url }}{% if filter.remove_querystring %}?{{ filter.remove_querystring }}{% endif %}"
           class="inline-flex min-h-8 items-center gap-2 rounded-full border border-gray-200 bg-white px-3 py-1 font-medium text-gray-700 transition hover:border-green-300 hover:text-green-700 focus:outline-none focus-visible:ring-2 focus-visible:ring-green-500 dark:border-gray-800 dark:bg-gray-900 dark:text-gray-200 dark:hover:border-green-800 dark:hover:text-green-300"
           aria-label="Remove {{ filter.label }} filter: {{ filter.value }}">
            <span>{{ filter.label }}: {{ filter.value }}</span>
            <span aria-hidden="true" class="text-base leading-none text-gray-400">&times;</span>
        </a>
    {% endfor %}
{% else %}
    <span class="text-gray-500 dark:text-gray-400">No filters applied</span>
{% endif %}
