{% if user.is_authenticated %}
  <form
    id="repo-like-{{ repository.pk }}"
    method="post"
    action="{% url 'repos:repo_like_toggle' owner=repository.owner name=repository.name %}"
    hx-post="{% url 'repos:repo_like_toggle' owner=repository.owner name=repository.name %}"
    hx-target="#repo-like-{{ repository.pk }}"
    hx-swap="outerHTML"
    class="inline-flex"
  >
    {% csrf_token %}
    <input type="hidden" name="next" value="{{ next_url|default:request.get_full_path }}" />
    <button
      type="submit"
      aria-label="{% if repository.is_liked %}Remove {{ repository.full_name }} from liked repositories{% else %}Like {{ repository.full_name }}{% endif %}"
      aria-pressed="{% if repository.is_liked %}true{% else %}false{% endif %}"
      title="{% if repository.is_liked %}Liked{% else %}Like this repo{% endif %}"
      class="inline-flex h-11 w-11 items-center justify-center rounded-full border transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-green-500 focus-visible:ring-offset-2 focus-visible:ring-offset-white dark:focus-visible:ring-offset-gray-950 {% if repository.is_liked %}border-red-300 bg-red-50 text-red-700 hover:bg-red-50 dark:border-red-900/70 dark:bg-gray-900 dark:text-red-300 dark:hover:bg-red-950/40{% else %}border-gray-300 bg-white text-gray-600 hover:bg-gray-50 hover:text-gray-900 dark:border-gray-700 dark:bg-gray-950 dark:text-gray-300 dark:hover:bg-gray-900 dark:hover:text-white{% endif %}"
    >
      <span class="sr-only">{% if repository.is_liked %}Unlike{% else %}Like{% endif %} {{ repository.full_name }}</span>
      <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="{% if repository.is_liked %}currentColor{% else %}none{% endif %}" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8Z" />
      </svg>
    </button>
  </form>
{% else %}
  <a
    id="repo-like-{{ repository.pk }}"
    href="{% url 'account_login' %}?next={{ request.get_full_path|urlencode }}"
    aria-label="Sign in to like {{ repository.full_name }}"
    title="Sign in to like this repo"
    class="inline-flex h-11 w-11 items-center justify-center rounded-full border border-gray-300 bg-white text-gray-600 transition-colors hover:bg-gray-50 hover:text-gray-900 focus:outline-none focus-visible:ring-2 focus-visible:ring-green-500 focus-visible:ring-offset-2 focus-visible:ring-offset-white dark:border-gray-700 dark:bg-gray-950 dark:text-gray-300 dark:hover:bg-gray-900 dark:hover:text-white dark:focus-visible:ring-offset-gray-950"
  >
    <span class="sr-only">Sign in to like {{ repository.full_name }}</span>
    <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8Z" />
    </svg>
  </a>
{% endif %}
