{% if user.is_authenticated and repository.user_starred_repository_id %}
  <span
    class="inline-flex h-11 w-11 items-center justify-center rounded-full border border-yellow-300 bg-yellow-50 text-yellow-700 shadow-sm dark:border-yellow-700/70 dark:bg-yellow-950/40 dark:text-yellow-300"
    title="Starred on GitHub"
  >
    <span class="sr-only">Starred {{ repository.full_name }} on GitHub{% if repository.user_starred_at %} on {{ repository.user_starred_at|date:"Y-m-d" }}{% endif %}</span>
    <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
      <path d="m12 2.25 3.02 6.12 6.76.98-4.89 4.77 1.15 6.73L12 17.67l-6.04 3.18 1.15-6.73-4.89-4.77 6.76-.98L12 2.25Z" />
    </svg>
  </span>
{% endif %}
