<div
  x-data="{ open: false, loading: false, feedback: '' }"
  @keydown.escape.window="open = false"
  class="fixed right-2 bottom-2 z-50 md:right-6 md:bottom-6"
>
  <button
    type="button"
    @click="open = !open; if (open) { $nextTick(() => $refs.feedbackInput.focus()) }"
    class="flex justify-center items-center w-10 h-10 text-white bg-blue-600 rounded-full shadow-lg transition-all duration-300 hover:bg-blue-700 md:w-16 md:h-16"
    aria-label="Provide feedback"
    :aria-expanded="open.toString()"
  >
    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
    </svg>
  </button>

  <div
    x-cloak
    x-show="open"
    x-transition.opacity
    @click.self="open = false"
    class="flex fixed inset-0 z-40 justify-center items-center bg-black bg-opacity-50"
  >
    <div
      x-show="open"
      x-transition.scale.origin.center
      class="p-6 mx-4 w-full max-w-md bg-white rounded-lg shadow-xl dark:bg-gray-900"
    >
      <h3 class="mb-4 text-lg font-medium text-gray-900 dark:text-gray-100">Share your feedback</h3>

      <form
        @submit.prevent="
          loading = true;
          window.submitFeedback(feedback)
            .then(() => { feedback = ''; open = false; })
            .catch((error) => window.appMessages.show(error.message || 'Failed to submit feedback. Please try again later.', 'error'))
            .finally(() => { loading = false; })
        "
      >
        <div class="mb-4">
          <textarea
            x-ref="feedbackInput"
            x-model="feedback"
            class="px-3 py-2 w-full rounded-md border border-gray-300 bg-white text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500 dark:border-gray-700 dark:bg-gray-800 dark:text-gray-100"
            rows="4"
            placeholder="What's on your mind?"
            required
          ></textarea>
        </div>

        <div class="flex justify-end space-x-3">
          <button
            type="button"
            @click="open = false"
            class="px-4 py-2 text-sm font-medium text-gray-700 bg-gray-100 rounded-md transition-colors hover:bg-gray-200 dark:bg-gray-800 dark:text-gray-200 dark:hover:bg-gray-700"
          >
            Cancel
          </button>
          <button
            type="submit"
            :disabled="loading || !feedback.trim()"
            class="px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-md transition-colors hover:bg-blue-700 disabled:cursor-not-allowed disabled:opacity-60"
          >
            <span x-text="loading ? 'Submitting...' : 'Send Feedback'">Send Feedback</span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
