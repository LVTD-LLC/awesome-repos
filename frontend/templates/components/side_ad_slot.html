<a
  href="{% if href %}{{ href }}{% else %}mailto:rasul@lvtd.dev?subject=Sponsor%20Awesome%20Repos{% endif %}"
  {% if href %}target="_blank" rel="noreferrer sponsored"{% endif %}
  class="group flex h-full min-h-0 flex-col overflow-hidden rounded-lg border border-gray-200 bg-white p-3 text-left shadow-sm transition hover:-translate-y-0.5 hover:border-green-400 hover:bg-green-50/70 hover:shadow-md focus:outline-none focus-visible:ring-2 focus-visible:ring-green-500 focus-visible:ring-offset-2 focus-visible:ring-offset-white dark:border-gray-800 dark:bg-gray-900/80 dark:hover:border-green-700 dark:hover:bg-green-950/30 dark:focus-visible:ring-offset-gray-950"
  data-ad-slot="{{ slot_id }}"
  aria-label="{{ position }} sponsor placement{% if headline %}: {{ headline }}{% endif %}"
>
  <span class="flex items-start justify-between gap-2">
    <span class="flex h-9 w-9 shrink-0 items-center justify-center overflow-hidden rounded-md border border-gray-200 bg-white p-1 dark:border-gray-700 dark:bg-gray-950">
      {% if logo_url %}
        <img src="{{ logo_url }}" alt="{{ headline }}" class="h-full w-full object-contain" loading="lazy" decoding="async" referrerpolicy="no-referrer">
      {% else %}
        <span class="text-xs font-black text-green-700 dark:text-green-300">AR</span>
      {% endif %}
    </span>
    <span class="inline-flex w-fit shrink-0 rounded-full border border-gray-200 px-2 py-1 text-[0.625rem] font-black uppercase text-gray-500 dark:border-gray-700 dark:text-gray-400">Ad</span>
  </span>

  <span class="mt-3 min-h-0">
    {% if eyebrow %}
      <span class="block truncate text-[0.625rem] font-black uppercase tracking-[0.16em] text-green-700 dark:text-green-300">{{ eyebrow }}</span>
    {% endif %}
    <span class="side-ad-title mt-1 block text-sm font-bold leading-5 text-gray-950 dark:text-white">{{ headline }}</span>
    <span class="side-ad-body mt-1.5 block text-xs leading-4 text-gray-600 dark:text-gray-300">{{ body }}</span>
  </span>

  <span class="mt-auto inline-flex items-center gap-1 pt-2 text-xs font-bold text-green-700 transition group-hover:text-green-800 dark:text-green-400 dark:group-hover:text-green-300">
    {{ cta }}
    <svg class="h-3.5 w-3.5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 17 17 7M9 7h8v8" />
    </svg>
  </span>
</a>
