<a
  href="mailto:hello@awesome_repos.app?subject=Sponsor%20Awesome%20Repos"
  class="group flex aspect-square flex-col justify-between overflow-hidden rounded-lg border border-dashed border-gray-300 bg-gray-50/80 p-3 text-left transition hover:border-green-400 hover:bg-green-50/70 focus:outline-none focus-visible:ring-2 focus-visible:ring-green-500 focus-visible:ring-offset-2 focus-visible:ring-offset-white dark:border-gray-800 dark:bg-gray-900/70 dark:hover:border-green-700 dark:hover:bg-green-950/30 dark:focus-visible:ring-offset-gray-950"
  data-ad-slot="{{ slot_id }}"
  aria-label="{{ position }} sponsor placement"
>
  <span class="inline-flex w-fit rounded-full border border-gray-300 px-2 py-1 text-[0.625rem] font-black uppercase text-gray-500 dark:border-gray-700 dark:text-gray-400">Ad</span>

  <span>
    <span class="block text-sm font-bold leading-5 text-gray-950 dark:text-white">{{ headline }}</span>
    <span class="mt-2 block text-xs leading-4 text-gray-600 dark:text-gray-300">{{ body }}</span>
  </span>

  <span class="inline-flex items-center gap-1 text-xs font-bold text-green-700 transition group-hover:text-green-800 dark:text-green-400 dark:group-hover:text-green-300">
    {{ cta }}
    <svg class="h-3.5 w-3.5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 17 17 7M9 7h8v8" />
    </svg>
  </span>
</a>
