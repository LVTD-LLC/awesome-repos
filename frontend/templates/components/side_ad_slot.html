{% if is_empty %}
    <button type="button"
            class="group relative flex h-full min-h-0 w-full flex-col items-center justify-center overflow-hidden rounded-lg border border-dashed border-gray-300 bg-gray-50/70 px-3 py-3 text-center transition hover:-translate-y-0.5 hover:border-green-400 hover:bg-green-50/70 hover:shadow-md focus:outline-none focus-visible:ring-2 focus-visible:ring-green-500 focus-visible:ring-offset-2 focus-visible:ring-offset-white dark:border-gray-800 dark:bg-gray-900/60 dark:hover:border-green-700 dark:hover:bg-green-950/30 dark:focus-visible:ring-offset-gray-950"
            data-ad-slot="{{ slot_id }}"
            data-ad-empty-slot="{{ slot_id }}"
            data-sponsor-modal-open
            aria-label="{{ position }} sponsor placement">
        <span class="flex h-10 w-10 items-center justify-center rounded-full border border-dashed border-gray-300 bg-white text-green-700 transition group-hover:border-green-400 group-hover:bg-green-50 dark:border-gray-700 dark:bg-gray-950 dark:text-green-400 dark:group-hover:border-green-700 dark:group-hover:bg-green-950/60">
            <svg class="h-5 w-5"
                 xmlns="http://www.w3.org/2000/svg"
                 fill="none"
                 viewBox="0 0 24 24"
                 stroke="currentColor"
                 aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v14M5 12h14" />
            </svg>
        </span>
        <span class="mt-3">
            <span class="side-ad-title text-sm font-bold leading-5 text-gray-950 dark:text-white">{{ headline }}</span>
            <span class="side-ad-body mt-2 text-xs leading-4 text-gray-600 dark:text-gray-300">{{ body }}</span>
        </span>
        <span class="mt-4 inline-flex items-center gap-1 text-xs font-bold text-green-700 transition group-hover:text-green-800 dark:text-green-400 dark:group-hover:text-green-300">
            {{ cta }}
            <svg class="h-3.5 w-3.5"
                 xmlns="http://www.w3.org/2000/svg"
                 fill="none"
                 viewBox="0 0 24 24"
                 stroke="currentColor"
                 aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 17 17 7M9 7h8v8" />
            </svg>
        </span>
    </button>
{% else %}
    <a href="{% if href %}{{ href }}{% else %}mailto:rasul@lvtd.dev?subject=Sponsor%20Awesome{% endif %}"
       {% if href %}target="_blank" rel="noreferrer sponsored"{% endif %}
       class="group relative flex h-full min-h-0 flex-col items-center justify-center overflow-hidden rounded-lg border px-3 py-3 text-center transition focus:outline-none focus-visible:ring-2 focus-visible:ring-green-500 focus-visible:ring-offset-2 focus-visible:ring-offset-white dark:focus-visible:ring-offset-gray-950 side-ad-card {{ tone_class|default:'side-ad-card-blue' }} shadow-sm hover:-translate-y-0.5 hover:border-green-400 hover:bg-green-50/70 hover:shadow-md dark:hover:border-green-700 dark:hover:bg-green-950/30"
       data-ad-slot="{{ slot_id }}"
       aria-label="{{ position }} sponsor placement{% if headline %}: {{ headline }}{% endif %}">
        <span class="absolute right-2 top-2 rounded-full border border-black/10 bg-white/80 px-1.5 py-0.5 text-[0.625rem] font-black uppercase leading-none text-gray-600 shadow-sm dark:border-white/10 dark:bg-gray-950/80 dark:text-gray-300">Ad</span>
        <span class="flex h-8 w-8 shrink-0 items-center justify-center overflow-hidden rounded-lg border border-gray-200 bg-white p-1 dark:border-gray-700 dark:bg-gray-950">
            {% if logo_url %}
                <img src="{{ logo_url }}"
                     alt="{{ headline }}"
                     class="h-full w-full object-contain"
                     loading="lazy"
                     decoding="async"
                     referrerpolicy="no-referrer">
            {% else %}
                <span class="text-xs font-black text-green-700 dark:text-green-300">{{ logo_text|default:"AR" }}</span>
            {% endif %}
        </span>
        <span class="mt-2 min-h-0">
            {% if eyebrow %}
                <span class="side-ad-eyebrow text-[0.625rem] font-black uppercase leading-4 text-green-700 dark:text-green-300">{{ eyebrow }}</span>
            {% endif %}
            <span class="side-ad-title text-sm font-bold leading-5 text-gray-950 dark:text-white">{{ headline }}</span>
            <span class="side-ad-body mt-2 text-xs leading-4 text-gray-600 dark:text-gray-300">{{ body }}</span>
        </span>
        <span class="mt-2 inline-flex items-center gap-1 text-xs font-bold leading-4 text-green-700 transition group-hover:text-green-800 dark:text-green-400 dark:group-hover:text-green-300">
            {{ cta }}
            <svg class="h-3.5 w-3.5"
                 xmlns="http://www.w3.org/2000/svg"
                 fill="none"
                 viewBox="0 0 24 24"
                 stroke="currentColor"
                 aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 17 17 7M9 7h8v8" />
            </svg>
        </span>
    </a>
{% endif %}
